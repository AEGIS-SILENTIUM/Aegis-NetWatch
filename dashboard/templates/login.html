<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NetWatch — Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; color: #e6edf3; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-box { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 40px; width: 360px; }
    .brand { text-align: center; font-size: 24px; font-weight: 700; color: #58a6ff; margin-bottom: 8px; }
    .subtitle { text-align: center; color: #8b949e; font-size: 13px; margin-bottom: 28px; }
    label { display: block; font-size: 13px; margin-bottom: 6px; color: #8b949e; }
    input { width: 100%; background: #21262d; border: 1px solid #30363d; color: #e6edf3; border-radius: 6px; padding: 10px 14px; font-size: 14px; margin-bottom: 16px; }
    input:focus { outline: none; border-color: #58a6ff; }
    .btn { width: 100%; background: #58a6ff; color: #0d1117; border: none; border-radius: 6px; padding: 11px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 4px; }
    .btn:hover { background: #79b8ff; }
    .error { background: #f851491a; border: 1px solid #f85149; color: #f85149; border-radius: 6px; padding: 10px 14px; font-size: 13px; margin-bottom: 16px; }
    .disclaimer { margin-top: 20px; font-size: 11px; color: #8b949e; text-align: center; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="brand">🛰 NetWatch</div>
    <div class="subtitle">Personal Network Monitor</div>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="POST">
      <label>Username</label>
      <input type="text" name="username" autocomplete="username" required>
      <label>Password</label>
      <input type="password" name="password" autocomplete="current-password" required>
      <button class="btn" type="submit">Sign In</button>
    </form>
    <div class="disclaimer">For authorized use on your own network only.</div>
  </div>
</body>
</html>
